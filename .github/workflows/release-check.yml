# Validates tagged Go module releases.
name: Release check

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  version-matches-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check Version const matches the tag
        run: |
          CONST_VERSION="v$(grep -o 'Version = "[^"]*"' zpljet.go | cut -d'"' -f2)"
          if [ "$CONST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME != Version const $CONST_VERSION in zpljet.go"
            echo "Delete the tag, bump the const, and re-tag."
            exit 1
          fi
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - run: go vet ./...
      - run: go test ./...
